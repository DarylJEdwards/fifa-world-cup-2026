name: CI

on:
  workflow_dispatch:
    inputs:
      run_provider_smoke:
        description: Run API-Football live provider smoke when secrets are configured
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "27 9 * * *"
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality gate
        run: npm run test:ci

      - name: Bundle budget
        run: node scripts/check-bundle-budget.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser

  provider-smoke:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_provider_smoke)
    runs-on: ubuntu-latest
    env:
      SPORTS_PROVIDER: api-football
      SPORTS_API_BASE_URL: https://v3.football.api-sports.io
      SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
      SPORTS_API_LEAGUE_ID: ${{ secrets.SPORTS_API_LEAGUE_ID }}
      SPORTS_API_SEASON: 2026
      PROVIDER_TIMEOUT_MS: 8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Check provider smoke secrets
        id: provider_secrets
        shell: bash
        run: |
          if [ -n "$SPORTS_API_KEY" ] && [ -n "$SPORTS_API_LEAGUE_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping provider smoke because SPORTS_API_KEY or SPORTS_API_LEAGUE_ID is not configured."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: API-Football live provider smoke
        if: steps.provider_secrets.outputs.available == 'true'
        run: npm run smoke:provider
