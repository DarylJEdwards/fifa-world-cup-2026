name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and API tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: node scripts/check-bundle-budget.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser
