name: CI

on:
  workflow_dispatch:
    inputs:
      run_provider_smoke:
        description: Run the official FIFA live provider smoke
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "27 9 * * *"
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Quality gate
        run: npm run test:ci

      - name: Bundle budget
        run: node scripts/check-bundle-budget.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser smoke
        run: npm run test:browser

  provider-smoke:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_provider_smoke)
    runs-on: ubuntu-latest
    env:
      SPORTS_PROVIDER: fifa
      SPORTS_API_BASE_URL: https://api.fifa.com
      SPORTS_API_SEASON: 2026
      PROVIDER_TIMEOUT_MS: 8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: FIFA official live provider smoke
        run: npm run smoke:provider
