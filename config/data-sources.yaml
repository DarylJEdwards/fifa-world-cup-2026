# Machine-readable data-source ledger for the World Cup command center.
# Keep this file current when source/provider state changes.

version: 1
updated_at: "2026-07-10"
active_source: fifa-official

sources:
  seed-cache:
    status: fallback
    mode: local-fallback
    files:
      - src/data/seed.ts
      - src/lib/standings.ts
    notes:
      - Development fallback data only.
      - Not official live tournament truth.

  fifa-official:
    status: active
    mode: provider-adapter
    provider: FIFA
    base_url: https://api.fifa.com
    required_env:
      - SPORTS_PROVIDER
      - SPORTS_API_BASE_URL
      - SPORTS_API_SEASON
    notes:
      - Official competition 17 and season 285023 are enforced.
      - A snapshot is accepted only with unique MatchNumber 1-104 and exact stage boundaries.
      - Scores, penalties, numeric statuses, dates, venues, teams, computed standings, and bracket map into TournamentSnapshot.
      - Automatic refresh is 15 seconds from 15 minutes before kickoff through live match windows and 300 seconds while idle.
      - Scheduled provider smoke requires no secret and fails closed on unknown enums or schema drift.
      - FIFA source attribution and rights guidance are documented.

  api-football:
    status: optional
    mode: supplemental-player-data
    provider: API-Football
    base_url: https://v3.football.api-sports.io
    required_env:
      - SPORTS_API_KEY
      - SPORTS_API_LEAGUE_ID
    notes:
      - Retained for optional player leaderboards only.
      - A missing API-Football key must never block official FIFA scores or results.
