# Machine-readable data-source ledger for the World Cup command center.
# Keep this file current when source/provider state changes.

version: 1
updated_at: "2026-07-09"
active_source: seed-cache

sources:
  seed-cache:
    status: active
    mode: local-fallback
    files:
      - src/data/seed.ts
      - src/lib/standings.ts
    notes:
      - Development fallback data only.
      - Not official live tournament truth.

  live-provider:
    status: adapter-complete-awaiting-production-secret
    mode: provider-adapter
    provider: API-Football
    base_url: https://v3.football.api-sports.io
    required_env:
      - SPORTS_PROVIDER
      - SPORTS_API_BASE_URL
      - SPORTS_API_KEY
      - SPORTS_API_LEAGUE_ID
      - SPORTS_API_SEASON
    notes:
      - API-Football key must stay in ignored local env or deployment secret storage.
      - League 1 and season 2026 are enforced for the FIFA World Cup.
      - A provider snapshot is accepted only with all 104 fixtures, including 72 group and 32 knockout matches.
      - Scores, penalties, statuses, standings, match stages, team profiles, and optional player leaderboards map into TournamentSnapshot.
      - Automatic refresh is 15 seconds live and 300 seconds idle; degraded browser retries are 30 seconds and optional player endpoints cache for 15 minutes.
      - Do not claim official live data until production provider and deployed live-mode smoke checks pass with real credentials.
